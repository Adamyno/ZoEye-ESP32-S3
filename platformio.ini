; PlatformIO Project Configuration for ZoEyee ESP32-S3
; Waveshare ESP32-S3-Touch-LCD-3.49 board
; AXS15231B QSPI display + LVGL v9

[env:esp32s3-zoeyee]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Memory configuration for ESP32-S3R8 (8MB PSRAM, 16MB Flash)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

lib_deps =
    h2zero/NimBLE-Arduino @ ^2.1.0
    lvgl/lvgl @ ^9.2.0

build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL configuration
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_TICK_PERIOD_MS=5
    ; Include paths
    -I include
    -I lib/axs15231b
    -I lib/lcd_bl_bsp
    -I lib/touch
